packages:
  - modules/*

allowBuilds:
  '@pkgr/core': true
  esbuild: true
  synckit: true
  unrs-resolver: true

autoInstallPeers: true

catalog:
  '@date-fns/tz': ^1.5.0
  '@js-temporal/polyfill': ^0.5.1
  '@type-challenges/utils': ~0.1.1
  '@types/luxon': ^3.7.2
  '@types/node': ^22.20.1
  '@typescript/analyze-trace': ^0.11.1
  '@typescript/native-preview': 7.0.0-dev.20251223.1
  '@vitest/ui': ^4.1.10
  '@yankeeinlondon/ask': ^0.4.0
  '@yankeeinlondon/claudine': ^0.4.1
  bumpp: ^11.1.0
  chalk: ^5.6.2
  cross-env: ^10.1.0
  date-fns: ^4.4.0
  dayjs: ^1.11.21
  fast-glob: ^3.3.3
  husky: ^9.1.7
  jiti: ^2.7.0
  luxon: ^3.7.2
  madge: ^8.0.0
  moment: ^2.30.1
  moment-timezone: ^0.6.2
  npm-run-all: ~4.1.5
  oxlint: ^1.73.0
  package-json-validator: ^1.5.2
  pathe: ^2.0.3
  taze: ^19.14.1
  tsdown: ^0.22.4
  tsx: ^4.23.0
  typecheck: ^0.1.2
  typed-tester: ~0.13.2
  typescript: ^6.0.3
  vite: ^8.1.4
  vite-node: ^6.0.0
  vitest: ^4.1.10
  vue: ^3.5.39
catalogMode: strict
ignoreWorkspaceRootCheck: true
linkWorkspacePackages: true

overrides:
  "braces@<3.0.3": ">=3.0.3"
  "micromatch@<4.0.8": ">=4.0.8"
  "tar@<6.2.1": ">=6.2.1"
  "vite@>=5.4.0 <=5.4.5": ">=5.4.21"
publicHoistPattern:
  - '*vitest*'
  - vite-node
shamefullyHoist: true
